name: Deploy Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: lanobe-jpe-764788
  AZURE_RESOURCE_GROUP: rg-lanobe-japaneast
  AZURE_CLIENT_ID: 31b69233-5a9e-46c9-b316-66c4db5ab72a
  AZURE_TENANT_ID: 1b693c95-d364-4b76-993b-f76c50fa37a3
  AZURE_SUBSCRIPTION_ID: 156607c2-d2c0-43ae-ad31-d9001d9a6e28

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate locally
        run: npm run test:local

      - name: Create deployment archive
        run: git archive --format=zip --output deploy.zip HEAD

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/cli@v2
        with:
          inlineScript: |
            # --async true: Kudu queues the zip and the CLI returns immediately
            # (avoids the 4-minute scm 504 GatewayTimeout on status polling).
            # The smoke-test step below verifies the site comes back.
            az webapp deploy \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --src-path deploy.zip \
              --type zip \
              --restart true \
              --async true

      - name: Smoke test the deployed site
        shell: bash
        run: |
          set -e
          URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/"
          echo "Waiting for $URL to return 200…"
          for i in $(seq 1 24); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$URL" || echo "000")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Deployment verified."
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test failed — deployment may have crashed."
          exit 1
